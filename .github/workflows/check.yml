name: dotfiles-check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  source-check:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Install verification tools
        run: brew install gitleaks jq shellcheck
      - name: Verify portable sources
        run: bash ./check.sh --source-only
      - name: Verify clean-home installation
        run: bash ./agents/tests/install-clean-home.sh
      - name: Verify fail-closed installation
        run: bash ./agents/tests/install-safety-tests.sh
